<template>
    <div class="slds-path">
        <div class="slds-grid slds-path__track">
            <div class="slds-grid slds-path__scroller-container">
                <div class="slds-path__scroller">
                    <div class="slds-path__scroller_inner">
                        <ul class="slds-path__nav" role="listbox" aria-orientation="horizontal"
                            aria-labelledby="slds-path__stage-name">
                            <template if:true={stagesStatus} for:each={stagesStatus} for:item="stage" for:index="index">
                               <li key={stage.title} class={stage.cssClass} role="presentation">
                                   <div aria-selected="true" class="slds-path__link" id="path-6" role="option"
                                       tabindex="-1">
                                       <span class="slds-path__stage">
                                        <lightning-icon icon-name="utility:check" alternative-text="Connected" variant="inverse" size="x-small" title="x-small size"></lightning-icon>
                                           <!-- <svg class="slds-icon slds-icon_x-small" aria-hidden="true">
                                               <use xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#check"></use>
                                           </svg> -->
                                       </span>
                                       <span class="slds-path__title">{stage.title}</span>
                                    </div>
                               </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
