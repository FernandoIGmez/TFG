<template>
  <div class="slds-box slds-theme_default">
    <!-- AÑADIR/ BORRAR Product list -->
    <div class="slds-grid slds-wrap">
      <template if:true={productList} for:each={productList} for:item="prod">
      <div key={prod.Id} class="slds-box slds-theme_default slds-size_1-of-3">
          <div class="product-container">
          <div class="square image-container">
              <img src={prod.ImageURL} alt={prod.Name} />
          </div>
  
          <div class="slds-text-align_center slds-m-top_small">
              <lightning-formatted-text value={prod.Name}></lightning-formatted-text>
          </div>
          <div class="slds-text-align_center">
              <lightning-formatted-number
              value={prod.UnitPrice}
              format-style="currency"
              currency-code="EUR"
              currency-display-as="symbol">
              </lightning-formatted-number>
          </div>
  
          <!-- Botón ELIMINAR -->
          <button class="action-btn delete-btn" title="Eliminar" data-id={prod.Id} onclick={handleDelete}>
            <span class={addDeleteSymbolClass}></span>
          </button>
          </div>
      </div>
      </template>
    </div>





    <!-- Add Icon -->
    <div class="slds-align_absolute-center slds-m-top_medium">
      <lightning-button-icon icon-name="utility:add" variant="border-filled" alternative-text="Add"></lightning-button-icon>
    </div>
  </div>

  <!-- Modal -->
  <div class="custom-modal" if:true={showAddingModal}>
    <section role="dialog" class="slds-modal slds-fade-in-open">
      <div class="slds-modal__container">
        <header class="slds-modal__header">
          <button class="slds-button slds-button_icon slds-modal__close" onclick={closeModal}>
            <lightning-icon icon-name="utility:close" alternative-text="Close" size="small" variant="inverse"></lightning-icon>
          </button>
          <h2 class="slds-text-heading_medium">Modal Header</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium">
          <!-- Modal content -->
        </div>

        <footer class="slds-modal__footer">
          <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
          <lightning-button variant="brand" label="Save"></lightning-button>
        </footer>
      </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
  </div>
</template>
